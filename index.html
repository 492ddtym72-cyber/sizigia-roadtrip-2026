<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0d16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Roadtrip · Gruppenplaner</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="stylesheet" href="./vendor/maplibre-gl.css">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="wrap">

  <header>
    <div class="eclipse" aria-hidden="true"></div>
    <div class="title">
      <h1>Roadtrip</h1>
      <div class="sub">Gemeinsam unterwegs</div>
    </div>
    <div class="header-tools">
      <button class="cloud-status profile-status" id="profileStatus" type="button" onclick="askWho()" aria-label="Profil wählen" title="Profil wählen">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.4"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/></svg>
      </button>
      <div class="cloud-wrap">
        <button class="cloud-status" id="cloudStatus" type="button" data-status="ok" onclick="toggleCloudDetails()" aria-expanded="false" aria-controls="cloudDetails" aria-label="Cloud-Sync Status">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.5 18H8.2a4.2 4.2 0 0 1-.7-8.35 5.9 5.9 0 0 1 11.1 1.95A3.2 3.2 0 0 1 17.5 18Z"/></svg>
          <span class="savedot" id="saveDot"></span>
        </button>
        <div class="cloud-details" id="cloudDetails" hidden>
          <div class="cloud-details-title">Cloud-Sync</div>
          <span id="syncBadge">–</span>
          <span id="saveInfo">–</span>
        </div>
      </div>
    </div>
  </header>

  <nav id="nav"></nav>

  <section class="page" id="page-uebersicht" data-title="Start"></section>
  <section class="page" id="page-route" data-title="Route"></section>
  <section class="page" id="page-spots" data-title="Spots"></section>
  <section class="page" id="page-logistik" data-title="Logistik"></section>
  <section class="page" id="page-packen" data-title="Packliste"></section>
  <section class="page" id="page-einkauf" data-title="Einkaufsliste"></section>
  <section class="page" id="page-budget" data-title="Budget"></section>
  <section class="page" id="page-sleep" data-title="Schlafplätze"></section>
  <section class="page" id="page-festival" data-title="Festival"></section>
  <section class="page" id="page-reminder" data-title="Orga"></section>
  <section class="page" id="page-verlauf" data-title="Verlauf"></section>
</div>

<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>
<div class="modal-bg map-modal-bg" id="mapModalBg" onclick="if(event.target===this)closeBigMap()">
  <div class="modal map-modal">
    <div class="map-modal-head">
      <h3>Große Karte</h3>
      <button class="btn ghost small" onclick="closeBigMap()">Schließen</button>
    </div>
    <div class="big-map-stage" id="bigMapStage"></div>
  </div>
</div>
<div id="toast"></div>

<script src="./vendor/maplibre-gl.js"></script>
<script src="./map-data.js"></script>
<script src="./app.js"></script>
</body>
</html>
