name: Camping mail safety net

on:
  schedule:
    # 08:00, 14:00 und 20:00 in der europäischen Sommerzeit (UTC+2).
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: camping-mail-runner
  cancel-in-progress: false

jobs:
  check-mail:
    if: ${{ vars.MAIL_RUNNER_MODE == 'shadow' || vars.MAIL_RUNNER_MODE == 'cloud' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MAIL_RUNNER_MODE: ${{ vars.MAIL_RUNNER_MODE }}
      MAIL_PROVIDER: ${{ vars.MAIL_PROVIDER }}
      ICLOUD_EMAIL: ${{ secrets.ICLOUD_EMAIL }}
      ICLOUD_APP_PASSWORD: ${{ secrets.ICLOUD_APP_PASSWORD }}
      GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - run: npm ci --prefix cloud-mail --ignore-scripts
      - run: npm test --prefix cloud-mail
      - run: node cloud-mail/runner.mjs
