<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0d16">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>Sizigia 2026 · Roadtrip-Planer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23ffb257'/><circle cx='58' cy='44' r='38' fill='%230b0d16'/></svg>">
<style>
/* ============================================================
   Sizigia 2026 · Roadtrip-Planer
   Theme: „Eclipse Night" — tiefer Nachthimmel, Sonnenkorona-Akzente
   ============================================================ */
:root{
  --bg:#0b0d16;
  --bg-2:#11142200;
  --card:rgba(255,255,255,.045);
  --card-solid:#161a2b;
  --border:rgba(255,255,255,.09);
  --border-strong:rgba(255,255,255,.18);
  --text:#eef0fa;
  --muted:#9aa0b8;
  --faint:#6a7089;
  --sun:#ffb257;
  --sun-deep:#ff8a3d;
  --coral:#ff6b4a;
  --sky:#8ea8ff;
  --mint:#5fd4a8;
  --danger:#ff5f6b;
  --radius:16px;
  --font-display:"Futura","Avenir Next","Century Gothic","Trebuchet MS",sans-serif;
  --font-body:"Avenir Next","Avenir","Segoe UI",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.5;
  overflow-x:hidden;
}
/* Nachthimmel: Korona-Glow + Sterne + Körnung */
body::before{
  content:"";position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:
    radial-gradient(ellipse 90% 45% at 78% -12%, rgba(255,138,61,.22), transparent 60%),
    radial-gradient(ellipse 70% 40% at 15% -8%, rgba(120,90,255,.14), transparent 60%),
    radial-gradient(ellipse 100% 60% at 50% 115%, rgba(45,60,140,.18), transparent 65%);
}
body::after{
  content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.5;
  background-image:
    radial-gradient(1px 1px at 22px 34px, #fff8, transparent 2px),
    radial-gradient(1px 1px at 187px 121px, #fff5, transparent 2px),
    radial-gradient(1.5px 1.5px at 311px 58px, #ffd9a88a, transparent 2px),
    radial-gradient(1px 1px at 421px 233px, #fff6, transparent 2px),
    radial-gradient(1px 1px at 89px 301px, #cfd8ff70, transparent 2px),
    radial-gradient(1.5px 1.5px at 512px 342px, #fff4, transparent 2px),
    radial-gradient(1px 1px at 269px 401px, #ffd9a860, transparent 2px);
  background-size:560px 460px;
}
.wrap{max-width:880px;margin:0 auto;padding:0 16px 96px}

/* ---------- Header ---------- */
header{
  padding:22px 0 12px;display:grid;grid-template-columns:40px minmax(0,1fr);
  align-items:center;gap:12px;
}
.eclipse{
  width:40px;height:40px;border-radius:50%;position:relative;
  background:radial-gradient(circle at 50% 50%, #05060c 58%, transparent 59%),
             radial-gradient(circle at 50% 50%, var(--sun) 60%, transparent 61%);
  box-shadow:0 0 18px 3px rgba(255,178,87,.36), 0 0 46px 10px rgba(255,138,61,.13);
  animation:pulse 5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 22px 4px rgba(255,178,87,.45),0 0 60px 12px rgba(255,138,61,.18)}50%{box-shadow:0 0 30px 7px rgba(255,178,87,.6),0 0 80px 18px rgba(255,138,61,.28)}}
.title{min-width:0}
.title h1{
  font-family:var(--font-display);font-size:clamp(26px,6vw,36px);
  letter-spacing:.06em;text-transform:uppercase;font-weight:700;line-height:1.1;
  background:linear-gradient(100deg,#fff 30%,var(--sun) 75%,var(--coral));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}
.title .sub{color:var(--muted);font-size:12px;letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.savebar{
  grid-column:1/-1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  font-size:11.5px;line-height:1.25;color:var(--muted);padding:7px 9px;margin-top:2px;
  background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.028));
  border:1px solid var(--border);border-radius:999px;box-shadow:inset 0 1px rgba(255,255,255,.05);
}
#saveInfo{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#syncBadge{
  margin-left:auto;color:var(--mint);font-weight:800;white-space:nowrap;padding:3px 8px;border-radius:999px;
  background:rgba(95,212,168,.08);border:1px solid rgba(95,212,168,.15);
}
.savedot{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint);transition:background .3s}
.savedot.saving{background:var(--sun)}

/* ---------- Navigation ---------- */
nav{
  position:sticky;top:0;z-index:50;display:flex;flex-wrap:wrap;justify-content:center;gap:10px;overflow-x:visible;
  padding:13px 16px 15px;margin:2px -16px 18px;
  background:linear-gradient(#0b0d16f4,#0b0d16e6);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  scrollbar-width:none;border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid var(--border);
}
nav::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;border:1px solid var(--border);background:rgba(255,255,255,.045);color:#b8bfd5;
  padding:11px 18px;border-radius:999px;font-size:14px;font-weight:750;cursor:pointer;
  font-family:var(--font-body);white-space:nowrap;transition:all .2s;
}
.tab:hover{border-color:var(--border-strong);color:var(--text);background:rgba(255,255,255,.065)}
.tab.active{
  background:linear-gradient(120deg,var(--sun-deep),var(--coral));color:#1a0d05;border-color:transparent;
  box-shadow:0 6px 22px -8px rgba(255,107,74,.65);
}
@media(max-width:520px){
  header{grid-template-columns:34px minmax(0,1fr);gap:10px;padding-top:18px}
  .eclipse{width:34px;height:34px}
  .title h1{font-size:clamp(22px,7vw,26px)}
  .title .sub{font-size:10.5px;letter-spacing:.13em}
  .savebar{font-size:11px;border-radius:18px;padding:8px 9px}
  #syncBadge{margin-left:15px;padding:2px 0;background:transparent;border:0}
  nav{flex-wrap:nowrap;justify-content:flex-start;overflow-x:auto;gap:8px;padding-top:10px;padding-bottom:11px}
  .tab{font-size:13px;padding:10px 15px}
}

nav{display:none}
.home-dashboard{display:grid;gap:14px;margin:6px 0 18px}
.home-kicker{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--sun);font-weight:800}
.home-intro{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:2px}
.home-intro h2{font-family:var(--font-display);font-size:20px;letter-spacing:.08em;text-transform:uppercase;color:var(--text);margin:0}
.home-intro p{font-size:13px;color:var(--muted);margin-top:3px;max-width:46ch}
.route-hero{
  position:relative;display:block;width:100%;min-height:196px;border:1px solid var(--border-strong);border-radius:22px;
  overflow:hidden;background:#101522;box-shadow:0 18px 45px rgba(0,0,0,.28), inset 0 1px rgba(255,255,255,.05);cursor:pointer;
  padding:0;font:inherit;color:var(--text);text-align:left;appearance:none;-webkit-appearance:none;
}
.route-hero-img{position:absolute;inset:0;background:#101522 center/cover no-repeat;filter:saturate(.98) contrast(1.04)}
.route-hero svg{position:absolute;inset:0;width:100%;height:100%;opacity:.42}
.route-hero::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(7,10,18,.96),rgba(7,10,18,.50) 56%,rgba(7,10,18,.36))}
.goa-ring{
  position:absolute;right:-24px;top:-26px;width:146px;height:146px;border-radius:50%;opacity:.18;z-index:1;
  background:repeating-conic-gradient(from 12deg,rgba(255,178,87,.9) 0 6deg,transparent 6deg 14deg);
}
.hero-copy{position:absolute;left:18px;right:18px;bottom:17px;z-index:2}
.hero-copy .eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--sun);font-weight:900}
.hero-copy b{display:block;font-size:25px;line-height:1.05;margin-top:5px}
.hero-copy span{display:block;font-size:13px;color:var(--muted);margin-top:4px}
.home-tile-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.home-tile{
  position:relative;min-height:116px;border:1px solid rgba(255,255,255,.13);border-radius:18px;
  background:
    linear-gradient(145deg,var(--tile-a,#1d273e),var(--tile-b,#121827));
  padding:13px;display:flex;flex-direction:column;justify-content:space-between;overflow:hidden;cursor:pointer;
  box-shadow:inset 0 1px rgba(255,255,255,.08),0 12px 28px rgba(0,0,0,.18);
  transition:border-color .16s,transform .16s,filter .16s;
}
.home-tile:hover{border-color:rgba(255,255,255,.24);filter:brightness(1.08);transform:translateY(-1px)}
.home-tile::before{
  content:"";position:absolute;inset:0;
  background:
    linear-gradient(135deg,rgba(255,255,255,.11),transparent 38%),
    repeating-linear-gradient(115deg,transparent 0 13px,rgba(255,255,255,.055) 13px 14px);
  opacity:.7;
}
.home-tile::after{
  content:"";position:absolute;right:-26px;bottom:-32px;width:118px;height:118px;border-radius:50%;
  background:radial-gradient(circle,var(--tile-accent,rgba(255,178,87,.24)),transparent 65%);
  opacity:.72;pointer-events:none;
}
.home-icon{position:relative;width:31px;height:31px;color:#f6f7ff;z-index:1}
.home-icon svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.home-watermark{position:absolute;right:9px;bottom:7px;width:66px;height:66px;color:rgba(255,255,255,.16);z-index:1}
.home-watermark svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.55;stroke-linecap:round;stroke-linejoin:round}
.home-tile b{position:relative;z-index:2;font-size:14px;color:#fff;text-shadow:0 1px 12px rgba(0,0,0,.42)}
.home-tile small{position:relative;z-index:2;font-size:10.5px;color:rgba(238,240,250,.78)}
.home-live{border:1px solid var(--border);border-radius:18px;background:rgba(255,255,255,.04);padding:13px}
.home-live b{display:block;color:var(--sun);font-size:13.5px}
.home-live span{display:block;color:var(--muted);font-size:12px;margin-top:3px}
.home-below{display:grid;gap:12px;margin-top:2px}
.home-tripline{
  display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:15px 16px;border:1px solid var(--border);
  border-radius:20px;background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.025));
}
.home-tripline .label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:800}
.home-tripline b{display:block;font-family:var(--font-display);font-size:24px;line-height:1.05;color:var(--text);margin-top:3px}
.home-tripline span{font-size:12px;color:var(--muted)}
.home-days{display:flex;align-items:baseline;gap:5px;color:var(--sun)}
.home-days strong{font-family:var(--font-display);font-size:34px;line-height:1}
.home-days small{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:800}
.home-clean-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:12px}
.home-panel{
  border:1px solid var(--border);border-radius:20px;background:rgba(255,255,255,.04);
  padding:15px;min-width:0;
}
.home-panel h2{font-family:var(--font-display);font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--sun);margin:0 0 11px}
.home-facts{display:grid;gap:8px}
.home-fact{display:grid;grid-template-columns:86px minmax(0,1fr);gap:10px;font-size:13px;border-top:1px solid rgba(255,255,255,.055);padding-top:8px}
.home-fact:first-child{border-top:0;padding-top:0}
.home-fact .k{color:var(--faint);font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;font-weight:800}
.home-fact .v{color:var(--text)}
.home-crew{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.home-crew .chip{font-size:12px;padding:4px 9px}
.home-progress-list{display:grid;gap:10px}
.home-progress-row{cursor:pointer}
.home-progress-row .top{display:flex;justify-content:space-between;gap:10px;font-size:12.5px;font-weight:750;color:var(--text)}
.home-progress-row .top span:last-child{color:var(--muted);font-weight:700}
.home-admin{
  display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;
  border:1px solid var(--border);border-radius:20px;background:rgba(255,255,255,.035);padding:14px 15px;
}
.home-admin b{display:block;color:var(--sun);font-size:13.5px}
.home-admin span{display:block;color:var(--muted);font-size:12px;margin-top:3px}
.home-admin .backup-actions{margin:0;justify-content:flex-end}
.home-admin .btn{white-space:nowrap}
.home-activity-line{
  display:flex;align-items:center;gap:10px;justify-content:space-between;border:1px solid var(--border);
  border-radius:18px;background:rgba(255,255,255,.03);padding:11px 13px;font-size:12.5px;color:var(--muted);
}
.home-activity-line b{color:var(--text);font-weight:700}
.section-return{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-return button{
  width:38px;height:38px;border-radius:13px;border:1px solid var(--border);background:var(--card);color:var(--sun);
  font-size:18px;font-weight:900;cursor:pointer;
}
.section-return span{font-size:13px;color:var(--muted);font-weight:700}
@media(min-width:760px){
  .home-tile-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
}
@media(max-width:640px){
  .home-intro{display:block}
  .route-hero{min-height:168px}
  .home-tile-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .home-tile{min-height:104px}
  .home-clean-grid,.home-admin,.home-tripline{grid-template-columns:1fr}
  .home-admin .backup-actions{justify-content:stretch}
  .home-admin .backup-actions .btn{flex:1}
  .home-fact{grid-template-columns:76px minmax(0,1fr)}
}

/* ---------- Allgemeine Bausteine ---------- */
section.page{display:none;animation:fadein .35s ease}
section.page.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;margin-bottom:14px;
}
.card h2{
  font-family:var(--font-display);font-size:15px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--sun);margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:700;
}
.card h2 .spacer{margin-left:auto}
.hint{font-size:12.5px;color:var(--faint);margin-top:8px}
.grid2{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:640px){.grid2{grid-template-columns:1fr 1fr}}
button{font-family:var(--font-body)}
.btn{
  border:1px solid var(--border-strong);background:var(--card);color:var(--text);
  padding:9px 15px;border-radius:11px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;
}
.btn:hover{background:rgba(255,255,255,.09)}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(120deg,var(--sun-deep),var(--coral));color:#1a0d05;border-color:transparent}
.btn.primary:hover{filter:brightness(1.08)}
.btn.small{padding:5px 10px;font-size:12.5px;border-radius:9px}
.btn.ghost{border-color:transparent;background:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--text);background:var(--card)}
.btn.danger{color:var(--danger);border-color:rgba(255,95,107,.35)}
.iconbtn{
  border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;
  width:36px;height:36px;border-radius:10px;font-size:16px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;
}
.iconbtn:hover{border-color:var(--border-strong)}

/* Chips (Crew, Votes, Zuordnung) */
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;
  border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:600;color:var(--muted);
  cursor:pointer;transition:all .15s;user-select:none;
}
.chip .dot{width:8px;height:8px;border-radius:50%;background:var(--c,#888)}
.chip.on{color:var(--text);border-color:var(--c,#888);background:color-mix(in srgb,var(--c,#888) 16%, transparent)}
.chip.static{cursor:default}

/* Listen (Packen, Einkauf, Checklisten) */
.list{display:flex;flex-direction:column}
.item{
  display:flex;align-items:center;gap:11px;padding:9px 4px;border-bottom:1px solid rgba(255,255,255,.05);
}
.item:last-of-type{border-bottom:none}
.checkbox{
  width:22px;height:22px;flex:0 0 auto;border-radius:7px;border:1.5px solid var(--border-strong);
  background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:#1a0d05;transition:all .15s;
}
.checkbox.done{background:linear-gradient(120deg,var(--sun-deep),var(--coral));border-color:transparent}
.item .txt{flex:1;font-size:14.5px;cursor:pointer;min-width:0;overflow-wrap:anywhere}
.item.done .txt{color:var(--faint);text-decoration:line-through}
.item .who{
  font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;flex:0 0 auto;
  background:color-mix(in srgb,var(--c,#888) 18%, transparent);color:var(--text);
  border:1px solid color-mix(in srgb,var(--c,#888) 45%, transparent);cursor:pointer;
}
.item .del{border:none;background:none;color:var(--faint);cursor:pointer;font-size:15px;padding:4px;flex:0 0 auto}
.item .del:hover{color:var(--danger)}
.addrow{display:flex;gap:8px;margin-top:11px}
.addrow input{flex:1}
input,select,textarea{
  font-family:var(--font-body);background:rgba(0,0,0,.28);border:1px solid var(--border-strong);
  color:var(--text);border-radius:11px;padding:10px 12px;font-size:14.5px;width:100%;outline:none;transition:border .15s;
}
input:focus,select:focus,textarea:focus{border-color:var(--sun)}
input::placeholder,textarea::placeholder{color:var(--faint)}
select option{background:var(--card-solid);color:var(--text)}
textarea{resize:vertical;min-height:70px}
.progress{height:8px;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden;margin-top:7px}
.progress i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--sun-deep),var(--coral));transition:width .4s ease}

/* ---------- Karte (Inline-SVG, offline) ---------- */
.mapwrap{border:1px solid var(--border);border-radius:14px;overflow-x:auto;background:#0a1020;margin-bottom:4px}
.mapwrap svg{display:block;width:100%;min-width:520px;height:auto}
.map-pt{cursor:pointer}
.map-pt:hover circle,.map-pt:hover rect{filter:brightness(1.2)}
.sea-label{fill:#2f3a66;font-size:13px;letter-spacing:.28em;text-transform:uppercase;font-family:var(--font-display);font-weight:700}
.city-label{fill:#8891b8;font-size:10px;font-family:var(--font-body)}
.layerchips{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.lchip{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:var(--card);font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;user-select:none;transition:all .15s}
.lchip .swatch{width:15px;height:3px;border-radius:2px;background:var(--c,#888);flex:0 0 auto}
.lchip.on{color:var(--text);border-color:var(--border-strong);background:rgba(255,255,255,.08)}
.lchip.static{cursor:default}
.pickmap svg{cursor:crosshair;min-width:0}
.pickmap .mapwrap{overflow:hidden}
.pickhint{font-size:12px;color:var(--faint);margin-top:6px}
.spotnum{
  display:inline-flex;align-items:center;justify-content:center;width:21px;height:21px;flex:0 0 auto;
  border-radius:6px;background:var(--coral);color:#1a0d05;font-size:12px;font-weight:800;transform:rotate(45deg);
}
.spotnum b{transform:rotate(-45deg)}

/* ---------- Übersicht ---------- */
.countdown{
  text-align:center;padding:30px 18px 26px;position:relative;overflow:hidden;
}
.countdown .label{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
.count-nums{display:flex;justify-content:center;gap:14px;margin:14px 0 6px}
.count-cell{min-width:72px}
.count-cell b{
  display:block;font-family:var(--font-display);font-size:clamp(34px,9vw,52px);font-weight:700;line-height:1;
  background:linear-gradient(180deg,#fff,var(--sun));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
}

/* ---------- Laden + Migration ---------- */
function migrate(s){
  if(!s || typeof s !== 'object') return defaultState();
  // Firebase RTDB speichert leere Arrays/Objekte NICHT — bei einem bereits
  // benutzten State (meta.lastSaved existiert) fehlende, leerbare Container
  // als leer wiederherstellen statt mit Defaults zu befüllen.
  if(s.meta && s.meta.lastSaved){
    ['checklist','returnStages','spots','festival','log'].forEach(k=>{ if(s[k] === undefined) s[k] = []; });
    if(s.budget === undefined) s.budget = {expenses:[]};
  }
  // Fehlende Top-Level-Schlüssel defensiv aus dem Standard ergänzen
  const def = defaultState();
  for(const k of Object.keys(def)){
    if(s[k] === undefined) s[k] = def[k];
  }
  // Verschachtelte Pflicht-Arrays normalisieren (ebenfalls Firebase-Schutz)
  (s.routes||[]).forEach(r=>{ r.stages = r.stages || []; });
  (s.spots||[]).forEach(sp=>{ sp.votes = sp.votes || []; });
  (s.vehicles||[]).forEach(v=>{ v.drivers=v.drivers||[]; v.passengers=v.passengers||[]; v.docs=v.docs||[]; });
  (s.packing||[]).forEach(c=>{ c.items = c.items || []; });
  (s.shopping||[]).forEach(c=>{ c.items = c.items || []; });
  s.budget.expenses = s.budget.expenses || [];
  s.budget.expenses.forEach(e=>{ e.sharers = e.sharers || []; });
  s.schemaVersion = SCHEMA_VERSION;
  return s;
}
const _bootRaw = StorageAdapter.load();
let state = migrate(_bootRaw);
// Frisches Gerät (noch nie lokal gespeichert): beim ersten Sync gewinnt IMMER
// der Gruppen-Stand aus der Cloud — sonst würde der frische Default-State
// wegen des neueren Zeitstempels die Gruppendaten überschreiben.
let _virgin = !_bootRaw;
const LOCAL_ONLY_KEY = STORAGE_KEY + '-local-only';
let _localOnlyRestore = false;
try{ _localOnlyRestore = localStorage.getItem(LOCAL_ONLY_KEY) === '1'; }catch(e){}

/* --- Automatische Sicherungen (Snapshots) ---
   Rollierend max. 5 Stände in localStorage: 1× täglich vor der ersten
   Änderung des Tages sowie vor Import/Wiederherstellung. */
const SNAP_KEY = STORAGE_KEY + '-snapshots';
function getSnapshots(){
  try{ return JSON.parse(localStorage.getItem(SNAP_KEY) || '[]'); }catch(e){ return []; }
}
function takeSnapshot(reason){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const snaps = getSnapshots();
    snaps.push({ts:new Date().toISOString(), reason, raw});
    while(snaps.length>5) snaps.shift();
    localStorage.setItem(SNAP_KEY, JSON.stringify(snaps));
  }catch(e){ console.warn('Snapshot fehlgeschlagen', e); }
}
function enterLocalOnlyMode(){
  if(!CLOUD_URL) return;
  _localOnlyRestore = true;
  try{ localStorage.setItem(LOCAL_ONLY_KEY, '1'); }catch(e){}
  clearTimeout(_syncTimer);
  setSyncStatus('localOnly');
}
function leaveLocalOnlyMode(){
  _localOnlyRestore = false;
  try{ localStorage.removeItem(LOCAL_ONLY_KEY); }catch(e){}
}
function openBackupLocal(data, snapshotReason, logDesc, toastMsg){
  takeSnapshot(snapshotReason);
  state = migrate(data);
  if(CLOUD_URL) enterLocalOnlyMode();
  logChange(logDesc, null);
  StorageAdapter.save(state);
  renderAll();
  updateSaveInfo(true);
  setSyncStatus(CLOUD_URL ? 'localOnly' : 'ok');
  toast(toastMsg, CLOUD_URL ? 'Gruppenstand laden' : null, CLOUD_URL ? loadGroupState : null);
}
function restoreSnapshot(idx){
  const snaps = getSnapshots();
  const s = snaps[idx];
  if(!s) return;
  const when = new Date(s.ts).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  const msg = CLOUD_URL
    ? 'Sicherung vom ' + when + ' Uhr nur auf diesem Gerät öffnen? Der Gruppenstand bleibt unverändert und der Sync wird hier pausiert, bis du den Gruppenstand wieder lädst.'
    : 'Sicherung vom ' + when + ' Uhr wiederherstellen? Der aktuelle Stand wird vorher gesichert.';
  if(!confirm(msg)) return;
  openBackupLocal(
    JSON.parse(s.raw),
    'Vor Wiederherstellung',
    'hat eine Sicherung lokal geöffnet (' + s.reason + ')',
    CLOUD_URL ? 'Sicherung lokal geöffnet — Gruppe bleibt unverändert ☁️' : 'Sicherung wiederhergestellt ↩'
  );
}

/* --- Rückgängig (eine Stufe) für Lösch-Aktionen --- */
let _undoJson = null;
function withUndo(msg, fn){
  _undoJson = JSON.stringify(state);
  fn(); save(); renderAll();
  toast(msg, 'Rückgängig', ()=>{
    state = migrate(JSON.parse(_undoJson));
    _undoJson = null;
    save(); renderAll();
    toast('Wiederhergestellt ↩');
  });
}

function save(){
  // Tagessicherung: 1× pro Tag den Stand VOR der ersten Änderung aufheben
  const snaps = getSnapshots(), today = new Date().toDateString();
  if(!snaps.some(s=>new Date(s.ts).toDateString()===today)) takeSnapshot('Tagessicherung');
  // Monoton steigender Zeitstempel: schützt Last-write-wins vor Uhren-
  // Schiefstand zwischen Geräten (lokale Änderung basiert immer auf dem
  // aktuellen Stand und muss ihn daher überstimmen)
  const prev = state.meta.lastSaved;
  let ts = new Date().toISOString();
  if(prev && ts <= prev) ts = new Date(new Date(prev).getTime() + 1000).toISOString();
  state.meta.lastSaved = ts;
  const dot = document.getElementById('saveDot');
  dot.classList.add('saving');
  const ok = StorageAdapter.save(state);
  setTimeout(()=>dot.classList.remove('saving'), 300);
  updateSaveInfo(ok);
  scheduleSync();
}
function updateSaveInfo(ok=true){
  const el = document.getElementById('saveInfo');
  if(!state.meta.lastSaved){ el.textContent = 'Noch nichts gespeichert'; return; }
  const d = new Date(state.meta.lastSaved);
  let txt = (ok===false ? 'Speichern fehlgeschlagen · ' : '') +
    'Gespeichert ' + d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) + ' · ' +
    d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  const le = state.meta.lastExport;
  if(!le) txt += ' · kein Backup';
  else{
    const days = Math.floor((Date.now() - new Date(le)) / 86400000);
    if(days >= 7) txt += ' · Backup ' + days + ' Tage alt';
  }
  el.textContent = txt;
}

/* ============================================================
   CLOUD-SYNC-ENGINE
   Local-first: localStorage bleibt Quelle für sofortiges Rendern,
   die Cloud hält alle Geräte auf demselben Stand.
   - Konflikte: Last-write-wins über meta.lastSaved (ISO-Vergleich).
     Vor Übernahme eines fremden Standes werden ungepushte lokale
     Änderungen als Snapshot gesichert.
   - Offline: fetch schlägt fehl → Status „offline", lokal geht alles
     weiter; erneuter Versuch per Intervall/online-Event.
   ============================================================ */
let _syncTimer = null, _syncing = false, _lastPushed = null;
function setSyncStatus(s){
  const el = document.getElementById('syncBadge');
  if(!el) return;
  if(!CLOUD_URL){ el.textContent = ''; return; }
  const map = {
    syncing:['Sync läuft','var(--sun)'],
    ok:['Synchron','var(--mint)'],
    offline:['Offline · lokal','var(--faint)'],
    localOnly:['Lokale Sicherung','var(--sun)'],
  };
  const m = map[s] || ['',''];
  el.textContent = m[0];
  el.style.color = m[1];
  el.style.cursor = s === 'localOnly' ? 'pointer' : '';
  el.title = s === 'localOnly' ? 'Gruppenstand wieder laden' : '';
  el.onclick = s === 'localOnly' ? loadGroupState : null;
}
async function cloudGet(){
  const r = await fetch(CLOUD_URL, {cache:'no-store'});
  if(!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}
async function cloudPut(){
  const r = await fetch(CLOUD_URL, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(state)});
  if(!r.ok) throw new Error('HTTP ' + r.status);
  _lastPushed = state.meta.lastSaved;
}
async function loadGroupState(){
  if(!CLOUD_URL || _syncing) return;
  _syncing = true;
  setSyncStatus('syncing');
  try{
    const remote = await cloudGet();
    if(remote){
      state = migrate(remote);
      StorageAdapter.save(state);
      _lastPushed = state.meta.lastSaved;
      leaveLocalOnlyMode();
      renderAll();
      toast('Gruppenstand geladen ☁️');
    } else {
      leaveLocalOnlyMode();
    }
    _virgin = false;
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('offline');
  }
  _syncing = false;
}
async function syncNow(){
  if(_localOnlyRestore){ setSyncStatus('localOnly'); return; }
  if(!CLOUD_URL || _syncing) return;
  _syncing = true;
  setSyncStatus('syncing');
  try{
    const remote = await cloudGet(); // null bei leerer Datenbank
    const rT = (remote && remote.meta && remote.meta.lastSaved) || '';
    const lT = state.meta.lastSaved || '';
    if(_virgin && remote){
      // Neues Gerät tritt der Gruppe bei: Cloud-Stand übernehmen, Zeitstempel egal
      state = migrate(remote);
      StorageAdapter.save(state);
      _lastPushed = state.meta.lastSaved;
      renderAll();
    } else if(rT && rT > lT){
      if(lT && _lastPushed !== lT) takeSnapshot('Vor Cloud-Übernahme');
      state = migrate(remote);
      StorageAdapter.save(state);
      _lastPushed = state.meta.lastSaved;
      renderAll();
      toast('Neuer Stand aus der Gruppe übernommen ☁️');
    } else if(lT && lT > rT){
      await cloudPut();
    } else {
      _lastPushed = lT;
    }
    _virgin = false;
    setSyncStatus('ok');
  }catch(e){
    setSyncStatus('offline');
  }
  _syncing = false;
}
function scheduleSync(){
  if(!CLOUD_URL) return;
  if(_localOnlyRestore){ setSyncStatus('localOnly'); return; }
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncNow, 1200);
}

/* ---------- Export / Import ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'roadtrip-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  state.meta.lastExport = new Date().toISOString();
  save();
  toast('Backup exportiert — z. B. in die WhatsApp-Gruppe schicken 📤');
}
function importData(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const data = JSON.parse(reader.result);
      if(!data || typeof data !== 'object' || !data.crew || !data.routes) throw new Error('Kein gültiges Roadtrip-Backup');
      const msg = CLOUD_URL
        ? 'Backup nur auf diesem Gerät öffnen? Der Gruppenstand bleibt unverändert und der Sync wird hier pausiert, bis du den Gruppenstand wieder lädst.'
        : 'Backup importieren? Die aktuellen Daten auf diesem Gerät werden überschrieben (eine Sicherung wird vorher angelegt).';
      if(!confirm(msg)) return;
      openBackupLocal(
        data,
        'Vor Import',
        'hat ein Backup lokal geöffnet',
        CLOUD_URL ? 'Backup lokal geöffnet — Gruppe bleibt unverändert ☁️' : 'Backup importiert ✅'
      );
    }catch(e){
      alert('Import fehlgeschlagen: ' + e.message);
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
}

/* ---------- Helfer ---------- */
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============================================================
   IDENTITÄT & VERLAUF (Changelog)
   - whoami: Crew-Mitglied dieses Geräts (nur lokal gespeichert).
   - state.log: geteiltes Protokoll aller Änderungen (max. 150),
     jede Aktion mit Umkehr-Daten (undo) für Schritt-Rückgängig.
   ============================================================ */
const WHO_KEY = STORAGE_KEY + '-whoami';
function whoami(){ return localStorage.getItem(WHO_KEY) || null; }
function setWhoami(id){ localStorage.setItem(WHO_KEY, id); renderAll(); toast('Alles klar, ' + (crewById(id)?.name || '') + ' 👋'); }
function askWho(){
  openModal('Wer bist du?', [
    {key:'who', label:'Damit der Verlauf weiß, wer was ändert (nur auf diesem Gerät gespeichert)', type:'select',
     value:whoami() || state.crew[0].id, options:state.crew.map(c=>({value:c.id, label:c.name}))}
  ], v=>{ localStorage.setItem(WHO_KEY, v.who); });
}
function logChange(desc, undo=null, who=whoami()){
  if(!Array.isArray(state.log)) state.log = [];
  state.log.push({id:uid(), ts:new Date().toISOString(), who, desc, undo});
  while(state.log.length > 150) state.log.shift();
}
function refLabel(ref){
  if(ref==='checklist') return 'Checkliste';
  const [kind, id] = ref.split(':');
  if(kind==='vdoc') return state.vehicles.find(v=>v.id===id)?.name || 'Fahrzeug';
  if(kind==='pack') return 'Packliste · ' + (state.packing.find(c=>c.id===id)?.name || '?');
  if(kind==='shop') return 'Einkauf · ' + (state.shopping.find(c=>c.id===id)?.name || '?');
  return ref;
}
// Inverse Operation eines Log-Eintrags anwenden; wirft, wenn das Ziel weg ist
function applyRevert(u){
  const need = x => { if(!x) throw new Error('Ziel existiert nicht mehr'); return x; };
  switch(u.t){
    case 'toggle':   need(resolveList(u.ref)?.find(i=>i.id===u.id)).done = u.prev; break;
    case 'itemAdd':  { const l=need(resolveList(u.ref)); const i=l.findIndex(x=>x.id===u.id); if(i<0) throw 0; l.splice(i,1); break; }
    case 'itemDel':  { const l=need(resolveList(u.ref)); l.splice(Math.min(u.idx,l.length),0,u.item); break; }
    case 'itemEdit': Object.assign(need(resolveList(u.ref)?.find(i=>i.id===u.id)), u.prev); break;
    case 'stageAdd': { const l=getStageList(u.ref); const i=l.findIndex(x=>x.id===u.id); if(i<0) throw 0; l.splice(i,1); break; }
    case 'stageDel': { const l=getStageList(u.ref); l.splice(Math.min(u.idx,l.length),0,u.stage); break; }
    case 'stageEdit':{ const s=need(getStageList(u.ref).find(x=>x.id===u.id));
      ['date','from','to','km','time','stay','note','link'].forEach(k=>s[k]=u.prev[k]);
      if(u.prev.lat!=null){ s.lat=u.prev.lat; s.lng=u.prev.lng; } else { delete s.lat; delete s.lng; } break; }
    case 'stageMove':{ const l=getStageList(u.ref); if(u.from<0||u.from>=l.length) throw 0; const [s]=l.splice(u.from,1); l.splice(u.to,0,s); break; }
    case 'routeSel': state.selectedRoute = u.prev; break;
    case 'vote':     { const sp=need(state.spots.find(s=>s.id===u.spotId)); const i=sp.votes.indexOf(u.crewId);
      if(u.prev && i<0) sp.votes.push(u.crewId); if(!u.prev && i>=0) sp.votes.splice(i,1); break; }
    case 'spotAdd':  { const i=state.spots.findIndex(s=>s.id===u.id); if(i<0) throw 0; state.spots.splice(i,1); break; }
    case 'spotDel':  state.spots.splice(Math.min(u.idx,state.spots.length),0,u.spot); break;
    case 'spotEdit': { const sp=need(state.spots.find(s=>s.id===u.id));
      ['name','region','detour','desc','link'].forEach(k=>sp[k]=u.prev[k]);
      if(u.prev.lat!=null){ sp.lat=u.prev.lat; sp.lng=u.prev.lng; } else { delete sp.lat; delete sp.lng; } break; }
    case 'driver':   { const v=need(state.vehicles.find(x=>x.id===u.vid)); const i=v.drivers.indexOf(u.cid);
      if(u.prev && i<0) v.drivers.push(u.cid); if(!u.prev && i>=0) v.drivers.splice(i,1); break; }
    case 'pass':     { state.vehicles.forEach(v=>{ const i=v.passengers.indexOf(u.cid); if(i>=0) v.passengers.splice(i,1); });
      if(u.prevVid){ need(state.vehicles.find(x=>x.id===u.prevVid)).passengers.push(u.cid); } break; }
    case 'vehEdit':  Object.assign(need(state.vehicles.find(x=>x.id===u.vid)), u.prev); break;
    case 'expAdd':   { const i=state.budget.expenses.findIndex(e=>e.id===u.id); if(i<0) throw 0; state.budget.expenses.splice(i,1); break; }
    case 'expDel':   state.budget.expenses.push(u.expense); break;
    case 'crewEdit': need(crewById(u.cid)).name = u.prev; break;
    case 'festAdd':  { const i=state.festival.findIndex(f=>f.id===u.id); if(i<0) throw 0; state.festival.splice(i,1); break; }
    case 'festDel':  state.festival.splice(Math.min(u.idx,state.festival.length),0,u.f); break;
    case 'festEdit': Object.assign(need(state.festival.find(f=>f.id===u.id)), u.prev); break;
    case 'catAdd':   { const t=u.kind==='pack'?state.packing:state.shopping; const i=t.findIndex(c=>c.id===u.id); if(i<0) throw 0; t.splice(i,1); break; }
    default: throw new Error('unbekannter Typ');
  }
}
function revertEntry(id){
  const e = (state.log||[]).find(x=>x.id===id);
  if(!e || !e.undo || e.undone) return;
  const backup = JSON.stringify(state);
  try{ applyRevert(e.undo); }
  catch(err){
    state = migrate(JSON.parse(backup));
    toast('Nicht mehr möglich — der betroffene Eintrag existiert nicht mehr');
    return;
  }
  e.undone = true;
  logChange('hat rückgängig gemacht: ' + e.desc, null);
  save(); renderAll();
  toast('Schritt rückgängig gemacht ↩', 'Doch nicht', ()=>{
    state = migrate(JSON.parse(backup));
    save(); renderAll();
  });
}
function crewById(id){ return state.crew.find(c=>c.id===id); }
function euro(n){ return n.toLocaleString('de-DE',{style:'currency',currency:'EUR'}); }
let _toastAction = null;
function toast(msg, actionLabel, actionFn){
  const t = document.getElementById('toast');
  t.innerHTML = esc(msg) + (actionLabel ? '<button onclick="runToastAction()">'+esc(actionLabel)+'</button>' : '');
  t.classList.toggle('actionable', !!actionLabel);

function geoLookup(text){
  const t=String(text||'').toLowerCase();

  return g ? {lat:g[0], lng:g[1]} : null;
}

let mapInfoLabels=[];
function mapInfo(i){ toast(mapInfoLabels[i]); }
function lineSvg(pts, color, {dashed, glow, faint}={}){
  if(pts.length<2) return '';
  const d='M'+pts.map(p=>{const q=project(p.lat,p.lng);return q.x.toFixed(1)+','+q.y.toFixed(1);}).join('L');
  return (glow?`<path d="${d}" fill="none" stroke="${color}" stroke-width="7" stroke-opacity=".2" stroke-linejoin="round" stroke-linecap="round"/>`:'')+
    `<path d="${d}" fill="none" stroke="${color}" stroke-width="${faint?1.8:2.4}" ${dashed?'stroke-dasharray="6 5"':''} stroke-linejoin="round" stroke-linecap="round" stroke-opacity="${faint?.4:(glow?1:.85)}"/>`;
}
function markerSvg(p, {num, color, kind, label}){
  const q=project(p.lat,p.lng), idx=mapInfoLabels.push(label)-1;
  const on=`class="map-pt" onclick="mapInfo(${idx})"`;
  if(kind==='start') return `<g ${on}><circle cx="${q.x}" cy="${q.y}" r="6" fill="#fff" stroke="${color}" stroke-width="3"/></g>`;
  if(kind==='dot')   return `<g ${on}><circle cx="${q.x}" cy="${q.y}" r="4.5" fill="${color}" stroke="#0a1020" stroke-width="1.4"/></g>`;
  if(kind==='spot')  return `<g ${on}><rect x="${q.x-8}" y="${q.y-8}" width="16" height="16" rx="3.5" transform="rotate(45 ${q.x} ${q.y})" fill="${color}" stroke="#0a1020" stroke-width="1.6"/><text x="${q.x}" y="${q.y+3.5}" text-anchor="middle" font-size="10" font-weight="800" fill="#1a0d05">${num}</text></g>`;
  return `<g ${on}><circle cx="${q.x}" cy="${q.y}" r="10" fill="${color}" stroke="#0a1020" stroke-width="1.6"/><text x="${q.x}" y="${q.y+3.8}" text-anchor="middle" font-size="11" font-weight="800" fill="#10131f">${num}</text></g>`;
}
// Etappenliste → Kartenpunkte (Startpunkt der 1. Etappe + alle Ziele, Duplikate kollabiert)
function routePts(stages){
  const pts=[];
  stages.forEach((s,i)=>{
    if(i===0){ const p0=pointOf(null, s.from); if(p0) pts.push({...p0, stage:i, start:true, label:'Start: '+s.from}); }
    const p=pointOf(s, s.to);
    if(!p) return;
    const prev=pts[pts.length-1];
    if(prev && Math.abs(prev.lat-p.lat)<1e-4 && Math.abs(prev.lng-p.lng)<1e-4) return;
    pts.push({...p, stage:i, label:(s.date?s.date+' · ':'')+s.from+' → '+s.to});
  });
  return pts;
}
const ROUTE_COLORS={'r-kueste':'#54c8ff','r-alpen':'#5fd4a8','r-mix':'#ff8a5c'};
let mapLayers={alle:false, rueck:true, spots:true};
function toggleMapLayer(k){ mapLayers[k]=!mapLayers[k]; renderRoute(); }
function spotMarkers(sorted, withNum){
  return sorted.map((sp,i)=>{
    const p=pointOf(sp, sp.name);
    if(!p) return '';
    return markerSvg(p,{num:i+1, color:'#ff6b4a', kind:'spot', label:'📍 '+sp.name+' ('+sp.votes.length+' ⭐)'});
  }).join('');
}
function buildRouteMap(){
  const sel=state.routes.find(r=>r.id===state.selectedRoute);
  let inner='';
  if(mapLayers.alle) state.routes.filter(r=>r.id!==sel.id).forEach(r=>{
    inner+=lineSvg(routePts(r.stages), ROUTE_COLORS[r.id]||'#888', {dashed:true, faint:true});
  });
  if(mapLayers.spots) inner+=spotMarkers(sortedSpots(), false);
  if(mapLayers.rueck){
    const pts=routePts(state.returnStages);
    inner+=lineSvg(pts,'#b18cff',{dashed:true});
    inner+=pts.map(p=>markerSvg(p,{color:'#b18cff', kind:'dot', label:'Rückreise · '+p.label})).join('');
  }
  const pts=routePts(sel.stages);
  inner+=lineSvg(pts,'#ffb257',{glow:true});
  inner+=pts.map(p=>markerSvg(p, p.start ? {color:'#ffb257', kind:'start', label:p.label}
                                         : {num:p.stage+1, color:'#ffb257', kind:'', label:p.label})).join('');
  return baseMapSvg(inner);
}
function buildSpotsMap(sorted){
  const sel=state.routes.find(r=>r.id===state.selectedRoute);
  let inner=lineSvg(routePts(sel.stages),'#ffb257',{faint:true});
  inner+=spotMarkers(sorted, true);
  return baseMapSvg(inner);
}

/* --- Kartenauswahl im Modal (Position durch Antippen setzen) --- */
function pickMapField(i, val, autoPos){
  const cur = val || null;
  let marker='';
  if(cur){ const q=project(cur.lat,cur.lng); marker=`<g id="pickmarker${i}"><circle cx="${q.x}" cy="${q.y}" r="9" fill="none" stroke="#ffb257" stroke-width="2"/><circle cx="${q.x}" cy="${q.y}" r="3.5" fill="#ffb257"/></g>`; }
  else if(autoPos){ const q=project(autoPos.lat,autoPos.lng); marker=`<g id="pickmarker${i}" opacity=".65"><circle cx="${q.x}" cy="${q.y}" r="9" fill="none" stroke="#8ea8ff" stroke-width="2" stroke-dasharray="3 3"/><circle cx="${q.x}" cy="${q.y}" r="3" fill="#8ea8ff"/></g>`; }
  return `<input type="hidden" id="mf${i}" value="${cur?cur.lat.toFixed(4)+','+cur.lng.toFixed(4):''}">
    <div class="pickmap" onclick="pickMapClick(event,${i})">${baseMapSvg(marker,'picksvg'+i)}</div>
    <div class="pickhint">${cur?'📍 Position manuell gesetzt.':(autoPos?'Position automatisch erkannt (blau gestrichelt).':'Keine Position erkannt.')} Karte antippen zum Setzen · <a href="#" style="color:var(--sky)" onclick="event.preventDefault();pickMapClear(${i})">Zurücksetzen auf Automatik</a></div>`;
}
function pickMapClick(ev, i){
  const svg=document.getElementById('picksvg'+i);
  const r=svg.getBoundingClientRect();
  const x=(ev.clientX-r.left)/r.width*MAP.W, y=(ev.clientY-r.top)/r.height*MAP.H;
  const p=unproject(x,y);
  document.getElementById('mf'+i).value=p.lat.toFixed(4)+','+p.lng.toFixed(4);
  const old=document.getElementById('pickmarker'+i); if(old) old.remove();
  const q=project(p.lat,p.lng);
  svg.insertAdjacentHTML('beforeend',`<g id="pickmarker${i}"><circle cx="${q.x}" cy="${q.y}" r="9" fill="none" stroke="#ffb257" stroke-width="2"/><circle cx="${q.x}" cy="${q.y}" r="3.5" fill="#ffb257"/></g>`);
}
function pickMapClear(i){
  document.getElementById('mf'+i).value='';
  const old=document.getElementById('pickmarker'+i); if(old) old.remove();
}
// Gespeicherte Werte aus dem Modal aufs Objekt anwenden
function applyPos(target, posStr){
  if(posStr){ const [la,ln]=posStr.split(',').map(Number); if(isFinite(la)&&isFinite(ln)){ target.lat=la; target.lng=ln; return; } }
  delete target.lat; delete target.lng;
}

let modalCtx = null;
function openModal(title, fields, onSave, onDelete){
  modalCtx = {fields, onSave, onDelete};
  const box = document.getElementById('modalBox');
  box.innerHTML = '<h3>' + esc(title) + '</h3>' + fields.map((f,i)=>{
    let input;
    if(f.type==='textarea') input = '<textarea id="mf'+i+'" placeholder="'+esc(f.placeholder||'')+'">'+esc(f.value||'')+'</textarea>';
    else if(f.type==='select') input = '<select id="mf'+i+'">'+f.options.map(o=>'<option value="'+esc(o.value)+'"'+(o.value===f.value?' selected':'')+'>'+esc(o.label)+'</option>').join('')+'</select>';
    else if(f.type==='map') input = pickMapField(i, f.value, f.auto);
    else input = '<input id="mf'+i+'" type="'+(f.type==='number'?'number':'text')+'" '+(f.type==='number'?'step="0.01" inputmode="decimal"':'')+' value="'+esc(f.value||'')+'" placeholder="'+esc(f.placeholder||'')+'">';
    return '<div class="field"><label>'+esc(f.label)+'</label>'+input+'</div>';
  }).join('') +
  '<div class="btnrow">' +
    (onDelete ? '<button class="btn danger" onclick="modalDelete()">Löschen</button>' : '') +
    '<button class="btn ghost" onclick="closeModal()">Abbrechen</button>' +
    '<button class="btn primary" onclick="modalSave()">Speichern</button>' +
  '</div>';
  document.getElementById('modalBg').classList.add('open');
  const first = document.getElementById('mf0');
  if(first && window.innerWidth > 700) first.focus();
}
function modalSave(){
  const vals = {};

  modalCtx.onSave(vals);
  closeModal(); save(); renderAll();
}
function modalDelete(){
  const fn = modalCtx.onDelete;

}

// Summen über Etappen: km aus "280 km", Stunden aus "~4,5 Std"
function routeTotals(stages){
  let km=0, h=0;
  stages.forEach(s=>{
    km += parseInt(String(s.km||'').replace(/[^\d]/g,''), 10) || 0;
    const m = String(s.time||'').replace(',','.').match(/(\d+(?:\.\d+)?)/);
    if(m) h += parseFloat(m[1]);
  });
  return {km, hTxt: String(Math.round(h*10)/10).replace('.',',')};
}

function sectionBackButton(){
  return `<div class="section-return"><button onclick="switchTab('uebersicht')" aria-label="Zur Übersicht">←</button><span>Zur Übersicht</span></div>`;
}
function renderOverview(){
  const start = new Date('2026-08-02T08:00:00');
  const diff = Math.max(0, start - Date.now());
  const days = Math.floor(diff/86400000), hrs = Math.floor(diff%86400000/3600000), min = Math.floor(diff%3600000/60000);
  const eclDays = Math.max(0, Math.ceil((new Date('2026-08-12T20:26:00') - Date.now())/86400000));
  const route = state.routes.find(r=>r.id===state.selectedRoute);
  const tot = routeTotals(route.stages);
  const pPack = listProgress(state.packing), pShop = listProgress(state.shopping), pCheck = listProgress(state.checklist);
  const pDocs = listProgress(state.vehicles.map(v=>({items:v.docs})));
  const recent = [...(state.log||[])].reverse()[0];

  document.getElementById('page-uebersicht').innerHTML = renderHomeDashboard(route, tot, pCheck) + `
    <div class="home-below">
      <div class="home-tripline">
        <div>
          <div class="label">Abfahrt · Sonntag, 2. August 2026</div>
          <b>${days} Tage · ${hrs} Std · ${min} Min</b>
          <span>Totale Sonnenfinsternis in ${eclDays} Tagen</span>
        </div>
        <div class="home-days"><strong>${days}</strong><small>Tage</small></div>
      </div>

      <div class="home-clean-grid">
        <div class="home-panel">
          <h2>Wichtige Infos</h2>
          <div class="home-facts">
            <div class="home-fact"><span class="k">Route</span><span class="v">${esc(route.name)} · ca. ${tot.km} km · ~${tot.hTxt} Std</span></div>
            <div class="home-fact"><span class="k">Start</span><span class="v">München & Innsbruck · 02.08.2026</span></div>
            <div class="home-fact"><span class="k">Festival</span><span class="v">Sizigia Eclipse Gathering · 10.–14.08. · Huesca</span></div>
            <div class="home-fact"><span class="k">Fahrzeuge</span><span class="v">Camper ab Innsbruck · Kleinwagen ab München</span></div>
          </div>
          <div class="home-crew">${state.crew.map(c=>`<span class="chip static" style="--c:${c.color}" onclick="editCrew('${c.id}')" title="Name bearbeiten"><span class="dot"></span>${esc(c.name)}</span>`).join('')}</div>
        </div>
        <div class="home-panel">
          <h2>Fortschritt</h2>
          <div class="home-progress-list">

function renderStage(s, listRef, idx, len){
  const link = mapsLink(s);
  // Während des Trips: heutige Etappe hervorheben (Datum "So 02.08." → Tag+Monat)
  const m = String(s.date||'').match(/(\d{1,2})\.(\d{1,2})\./);
  const now = new Date();
  const isToday = m && +m[1]===now.getDate() && +m[2]===now.getMonth()+1;
  return `
  <div class="stage${isToday?' today':''}">
    <div class="actions">
      ${idx>0?`<button title="nach oben" onclick="moveStage('${listRef}',${idx},-1)">↑</button>`:''}
      ${idx<len-1?`<button title="nach unten" onclick="moveStage('${listRef}',${idx},1)">↓</button>`:''}
      <button title="bearbeiten" onclick="editStage('${listRef}',${idx})">✎</button>
    </div>
    <div class="toprow"><span class="date">${esc(s.date)}</span>${isToday?'<span class="todaybadge">HEUTE</span>':''}<span class="fromto">${esc(s.from)} → ${esc(s.to)}</span></div>
    <div class="meta">
      ${s.km?`<span>📏 ${esc(s.km)}</span>`:''}
      ${s.time?`<span>⏱ ${esc(s.time)}</span>`:''}
      ${link?`<a class="maplink" href="${esc(link)}" target="_blank" rel="noopener">🗺️ Karte öffnen</a>`:''}
    </div>
    ${s.stay?`<div class="stay">⛺ ${esc(s.stay)}</div>`:''}
    ${s.note?`<div class="note">${esc(s.note)}</div>`:''}
  </div>`;
}
function getStageList(ref){
  if(ref==='return') return state.returnStages;
  return state.routes.find(r=>r.id===ref).stages;
}

function addStage(ref){

function editStage(ref, idx){
  const list = getStageList(ref);
  const s = list[idx];
  openModal('Etappe bearbeiten', stageFields(s), v=>{
    const prev = {date:s.date, from:s.from, to:s.to, km:s.km, time:s.time, stay:s.stay, note:s.note, link:s.link, lat:s.lat, lng:s.lng};
    const {pos, ...rest} = v;
    Object.assign(s, rest);
    applyPos(s, pos);
    logChange('hat Etappe „'+s.from+' → '+s.to+'" bearbeitet', {t:'stageEdit', ref, id:s.id, prev});
  }, ()=>{
    logChange('hat Etappe „'+s.from+' → '+s.to+'" gelöscht', {t:'stageDel', ref, stage:{...s}, idx});
    list.splice(idx,1);
  });

function moveStage(ref, idx, dir){
  const list = getStageList(ref);
  const [s] = list.splice(idx,1);
  list.splice(idx+dir,0,s);
  logChange('hat Etappe „'+s.from+' → '+s.to+'" verschoben', {t:'stageMove', ref, from:idx+dir, to:idx});
  save(); renderAll();
}

function togglePassenger(vid, cid){
  // Eine Person sitzt in genau einem Fahrzeug: woanders austragen
  const v = state.vehicles.find(x=>x.id===vid);
  const prevVid = state.vehicles.find(o=>o.passengers.includes(cid))?.id || null;
  const name = crewById(cid)?.name || '?';
  const i = v.passengers.indexOf(cid);
  if(i>=0){
    v.passengers.splice(i,1);
    logChange('hat '+name+' aus „'+v.name+'" ausgetragen', {t:'pass', cid, prevVid});
  } else {
    state.vehicles.forEach(o=>{ const j=o.passengers.indexOf(cid); if(j>=0) o.passengers.splice(j,1); });

    logChange('hat '+name+' in „'+v.name+'" gesetzt', {t:'pass', cid, prevVid});
  }
  save(); renderAll();
}

  const v = state.vehicles.find(x=>x.id===vid);
  const i = v.drivers.indexOf(cid);
  const was = i>=0;
  if(was) v.drivers.splice(i,1); else v.drivers.push(cid);
  logChange((crewById(cid)?.name||'?') + (was?' ist kein Fahrer mehr von „':' ist jetzt Fahrer von „') + v.name + '"',
    {t:'driver', vid, cid, prev:was});

/* ============================================================
   GENERISCHE LISTEN (Packen / Einkauf / Checklisten)
   listRef: 'checklist' | 'vdoc:<vehicleId>' | 'pack:<catId>' | 'shop:<catId>'
   ============================================================ */
function resolveList(ref){
  if(ref==='checklist') return state.checklist;
  const [kind, id] = ref.split(':');
  if(kind==='vdoc') return state.vehicles.find(v=>v.id===id).docs;
  if(kind==='pack') return state.packing.find(c=>c.id===id).items;
  if(kind==='shop') return state.shopping.find(c=>c.id===id).items;
  return null;
}
function itemRow(item, ref){
  const who = item.who ? crewById(item.who) : null;
  return `
  <div class="item${item.done?' done':''}">
    <button class="checkbox${item.done?' done':''}" onclick="toggleItem('${ref}','${item.id}')" aria-label="abhaken">${item.done?'✓':''}</button>
    <span class="txt" onclick="editItem('${ref}','${item.id}')">${esc(item.text)}</span>
    ${who?`<span class="who" style="--c:${who.color}" onclick="editItem('${ref}','${item.id}')">${esc(who.name)}</span>`:''}
    <button class="del" onclick="deleteItem('${ref}','${item.id}')" aria-label="löschen">✕</button>
  </div>`;
}
function toggleItem(ref, id){
  const it = resolveList(ref).find(i=>i.id===id);
  it.done = !it.done;
  logChange((it.done ? 'hat „'+it.text+'" abgehakt' : 'hat den Haken bei „'+it.text+'" entfernt') + ' (' + refLabel(ref) + ')',
    {t:'toggle', ref, id, prev:!it.done});
  save(); renderAll();
}
function deleteItem(ref, id){
  const list = resolveList(ref);
  const idx = list.findIndex(i=>i.id===id);
  if(idx<0) return;
  const label = list[idx].text;
  withUndo('„' + (label.length>28 ? label.slice(0,28)+'…' : label) + '" gelöscht', ()=>{
    logChange('hat „'+label+'" gelöscht (' + refLabel(ref) + ')', {t:'itemDel', ref, item:{...list[idx]}, idx});
    list.splice(idx,1);
  });
}
function addListItem(ref){
  const input = document.getElementById('add-' + ref.replace(':','-'));
  const text = input.value.trim();
  if(!text) return;
  const item = {id:uid(), text, done:false, who:''};
  resolveList(ref).push(item);
  logChange('hat „'+text+'" hinzugefügt (' + refLabel(ref) + ')', {t:'itemAdd', ref, id:item.id});
  input.value = '';
  save(); renderAll();
  // Fokus zurück ins Eingabefeld für schnelles Weitertippen
  const again = document.getElementById('add-' + ref.replace(':','-'));
  if(again) again.focus();
}
function editItem(ref, id){
  const it = resolveList(ref).find(i=>i.id===id);
  openModal('Eintrag bearbeiten', [
    {key:'text',label:'Text',value:it.text},
    {key:'who',label:'Wer bringt’s mit / erledigt’s?',type:'select',value:it.who||'',
      options:[{value:'',label:'– niemand zugeordnet –'}, ...state.crew.map(c=>({value:c.id,label:c.name}))]},
  ], v=>{
    const prev = {text:it.text, who:it.who};
    it.text = v.text.trim()||it.text; it.who = v.who;
    logChange('hat „'+it.text+'" bearbeitet (' + refLabel(ref) + ')', {t:'itemEdit', ref, id, prev});
  }, ()=>{
    const l=resolveList(ref); const i=l.findIndex(x=>x.id===id);
    logChange('hat „'+l[i].text+'" gelöscht (' + refLabel(ref) + ')', {t:'itemDel', ref, item:{...l[i]}, idx:i});
    l.splice(i,1);
  });
}

/* ============================================================
   BUDGET — geteilte Ausgaben & Ausgleich
   ============================================================ */
// Salden (gezahlt minus Anteil) + Greedy-Ausgleichsvorschläge
function budgetCalc(){
  const ex = state.budget.expenses;
  const total = ex.reduce((s,e)=>s+e.amount,0);
  const bal = {};
  state.crew.forEach(c=>bal[c.id]=0);
  ex.forEach(e=>{
    if(bal[e.payer]!==undefined) bal[e.payer] += e.amount;
    const sharers = e.sharers.filter(id=>bal[id]!==undefined);
    if(sharers.length===0) return;
    const share = e.amount / sharers.length;
    sharers.forEach(id=>bal[id] -= share);
  });
  const debtors = [], creditors = [];
  state.crew.forEach(c=>{
    const b = Math.round(bal[c.id]*100)/100;
    if(b < -0.01) debtors.push({id:c.id, amt:-b});
    else if(b > 0.01) creditors.push({id:c.id, amt:b});
  });
  debtors.sort((a,b)=>b.amt-a.amt); creditors.sort((a,b)=>b.amt-a.amt);
  const settlements = [];
  let di=0, ci=0;
  while(di<debtors.length && ci<creditors.length){
    const pay = Math.min(debtors[di].amt, creditors[ci].amt);
    settlements.push({from:debtors[di].id, to:creditors[ci].id, amt:pay});
    debtors[di].amt -= pay; creditors[ci].amt -= pay;
    if(debtors[di].amt < 0.01) di++;
    if(creditors[ci].amt < 0.01) ci++;
  }
  return {total, bal, settlements};
}
// Ausgleich als Text teilen (z. B. WhatsApp) — Zwischenablage mit Fallback
function copySettlement(){
  const {settlements, total} = budgetCalc();
  if(!settlements.length){ toast('Nichts auszugleichen ✨'); return; }
  const txt = '💶 Roadtrip-Ausgleich (Gesamt: '+euro(total)+')\n' +
    settlements.map(s=>crewById(s.from).name+' → '+crewById(s.to).name+': '+euro(s.amt)).join('\n');
  const done = ()=>toast('Ausgleich kopiert — ab in die Gruppe 📋');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done, ()=>fallbackCopy(txt, done));
  } else fallbackCopy(txt, done);
}
function fallbackCopy(txt, done){
  const ta = document.createElement('textarea');
  ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){ toast('Kopieren nicht möglich'); }
  ta.remove();
}
function renderBudget(){
  const ex = state.budget.expenses;
  const {total, bal, settlements} = budgetCalc();

  document.getElementById('page-budget').innerHTML = sectionBackButton() + `
    <div class="card">
      <h2>💶 Neue Ausgabe</h2>
      <div class="formgrid">
        <input id="exDesc" class="full" placeholder="Was? (z. B. Tanken Brenner, Einkauf Lidl)">
        <input id="exAmount" type="number" step="0.01" inputmode="decimal" placeholder="Betrag €">
        <select id="exPayer">${state.crew.map(c=>`<option value="${c.id}"${c.id===whoami()?' selected':''}>${esc(c.name)} hat gezahlt</option>`).join('')}</select>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:7px;letter-spacing:.06em;text-transform:uppercase">Wird geteilt durch (antippen):</div>
      <div class="chips" id="exSharers">
        ${state.crew.map(c=>`<span class="chip on" style="--c:${c.color}" data-id="${c.id}" onclick="this.classList.toggle('on')"><span class="dot"></span>${esc(c.name)}</span>`).join('')}
      </div>
      <div style="margin-top:13px"><button class="btn primary" style="width:100%" onclick="addExpense()">Ausgabe hinzufügen</button></div>
    </div>

    <div class="grid2">
      <div class="card">
        <h2>⚖️ Salden ${total>0?`<span class="spacer"></span><span style="font-size:12px;color:var(--faint);letter-spacing:0;text-transform:none">Gesamt: ${euro(total)}</span>`:''}</h2>
        ${state.crew.map(c=>{
          const b = bal[c.id];
          return `<div class="balance"><span class="chip static" style="--c:${c.color}"><span class="dot"></span>${esc(c.name)}</span><span class="amt ${b>0.01?'pos':b<-0.01?'neg':''}">${b>0.01?'+':''}${euro(b)}</span></div>`;
        }).join('')}
        <div class="hint">Plus = bekommt Geld zurück · Minus = schuldet</div>
      </div>
      <div class="card">
        <h2>🤝 Ausgleich ${settlements.length?`<span class="spacer"></span><button class="btn small" onclick="copySettlement()">📋 Kopieren</button>`:''}</h2>
        ${settlements.length===0 ? '<p class="hint" style="margin:0">Alles ausgeglichen ✨</p>' :
          settlements.map(s=>`<div class="settle"><b>${esc(crewById(s.from).name)}</b> <span class="arrow">→</span> <b>${esc(crewById(s.to).name)}</b>: ${euro(s.amt)}</div>`).join('')}
      </div>
    </div>

    <div class="card">
      <h2>🧾 Alle Ausgaben</h2>
      ${ex.length===0 ? '<p class="hint" style="margin:0">Noch keine Ausgaben erfasst.</p>' :
        [...ex].reverse().map(e=>{
          const payer = crewById(e.payer);
          return `
          <div class="expense">
            <div class="info">
              <div class="desc">${esc(e.desc)}</div>
              <div class="sub">${payer?esc(payer.name):'?'} · geteilt durch ${e.sharers.length} · ${new Date(e.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})}</div>
            </div>
            <span class="amt">${euro(e.amount)}</span>
            <button class="del" onclick="deleteExpense('${e.id}')" aria-label="löschen">✕</button>
          </div>`;
        }).join('')}
    </div>`;
}
function addExpense(){
  const desc = document.getElementById('exDesc').value.trim();
  const amount = parseFloat(String(document.getElementById('exAmount').value).replace(',','.'));
  const payer = document.getElementById('exPayer').value;
  const sharers = [...document.querySelectorAll('#exSharers .chip.on')].map(el=>el.dataset.id);
  if(!desc){ toast('Beschreibung fehlt'); return; }
  if(!amount || amount<=0){ toast('Gültigen Betrag eingeben'); return; }
  if(sharers.length===0){ toast('Mindestens eine Person auswählen'); return; }
  const exp = {id:uid(), date:new Date().toISOString(), desc, amount, payer, sharers};
  state.budget.expenses.push(exp);
  logChange('hat Ausgabe „'+desc+'" ('+euro(amount)+', gezahlt von '+(crewById(payer)?.name||'?')+') eingetragen', {t:'expAdd', id:exp.id});
  save(); renderAll();
  toast('Ausgabe gespeichert 💶');
}
function deleteExpense(id){
  const e = state.budget.expenses.find(x=>x.id===id);
  withUndo('Ausgabe gelöscht', ()=>{
    logChange('hat Ausgabe „'+e.desc+'" ('+euro(e.amount)+') gelöscht', {t:'expDel', expense:{...e}});
    state.budget.expenses = state.budget.expenses.filter(x=>x.id!==id);
  });
}

/* ============================================================
   VERLAUF (Changelog)
   ============================================================ */
function fmtLogTs(ts){
  const d = new Date(ts), now = new Date();
  const time = d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
  if(d.toDateString() === now.toDateString()) return 'Heute ' + time;
  if(d.toDateString() === new Date(now - 86400000).toDateString()) return 'Gestern ' + time;
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}) + ' ' + time;
}
function logRow(e){
  const c = e.who ? crewById(e.who) : null;
  return `<div class="logrow${e.undone?' undone':''}">
    <span class="chip static" style="--c:${c?c.color:'#666'}"><span class="dot"></span>${c?esc(c.name):'—'}</span>
    <div class="loginfo">
      <div class="logdesc">${esc(e.desc)}</div>
      <div class="logts">${fmtLogTs(e.ts)}${e.undone?' · rückgängig gemacht':''}</div>
    </div>
    ${e.undo && !e.undone ? `<button class="btn ghost small" onclick="revertEntry('${e.id}')" title="Diesen Schritt rückgängig machen">↩︎</button>` : ''}
  </div>`;
}
function renderLog(){
  const entries = [...(state.log||[])].reverse().slice(0,100);
  const me = whoami();
  document.getElementById('page-verlauf').innerHTML = sectionBackButton() + `
    <div class="card">
      <h2>🙋 Wer bist du?</h2>
      <div class="chips">${state.crew.map(c=>`<span class="chip${me===c.id?' on':''}" style="--c:${c.color}" onclick="setWhoami('${c.id}')"><span class="dot"></span>${esc(c.name)}</span>`).join('')}</div>
      <div class="hint">Wird nur auf diesem Gerät gespeichert — damit der Verlauf weiß, wer was ändert.</div>
    </div>
    <div class="card">
      <h2>🕘 Verlauf</h2>
      ${entries.length===0 ? '<p class="hint" style="margin:0">Noch keine Änderungen protokolliert — ab jetzt wird alles hier festgehalten.</p>' : entries.map(logRow).join('')}
      ${(state.log||[]).length>100 ? '<p class="hint">Nur die letzten 100 Einträge werden angezeigt (gespeichert: max. 150).</p>' : ''}
      <div class="hint">↩︎ macht genau diesen einen Schritt rückgängig — auch Schritte von anderen. Für größere Sprünge: Sicherungen in der Übersicht.</div>
    </div>`;
}

/* ============================================================
   RENDER-ROOT
   ============================================================ */
function renderAll(){
  mapInfoLabels.length = 0;
  // Halb getippte Eingaben (Add-Felder, Budget-Formular) über Re-Renders retten
  const keepVals = {}, offChips = [];
  document.querySelectorAll('input[id], select[id], textarea[id]').forEach(el=>{
    if(el.closest('#modalBox') || el.type==='file' || el.type==='hidden') return;
    if(el.tagName==='SELECT' || el.value) keepVals[el.id] = el.value;
  });
  document.querySelectorAll('#exSharers .chip:not(.on)').forEach(el=>offChips.push(el.dataset.id));
  renderNav();
  // Karten auf schmalen Screens initial Richtung Routenmitte scrollen
  requestAnimationFrame(()=>{
    document.querySelectorAll('.mapwrap').forEach(w=>{
      if(w.scrollWidth > w.clientWidth) w.scrollLeft = (w.scrollWidth - w.clientWidth) * .55;
    });
  });
  renderOverview();
  renderRoute();
  renderSpots();
  renderLogistics();
  renderPacking();
  renderShopping();
  renderBudget();
  renderFestival();
  renderLog();
  updateSaveInfo();
  // Gerettete Eingaben wiederherstellen
  for(const id in keepVals){
    const el = document.getElementById(id);
    if(el && (el.tagName==='SELECT' || !el.value)) el.value = keepVals[id];
  }
  offChips.forEach(id=>{
    const el = document.querySelector('#exSharers .chip[data-id="'+id+'"]');
    if(el) el.classList.remove('on');
  });
}
renderAll();
// Erstbesuch: Standarddaten direkt persistieren
if(!state.meta.lastSaved) save();
// Erste Nutzung auf diesem Gerät: fragen, wer da tippt (für den Verlauf)
if(!whoami()) setTimeout(askWho, 600);
// Offline-Start ermöglichen: Service Worker cached die App (nur gehostet, nicht file://)
if('serviceWorker' in navigator && location.protocol === 'https:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
// Mehrere offene Tabs synchron halten: schreibt ein anderer Tab, hier nachziehen
// (das storage-Event feuert nur in den JEWEILS ANDEREN Tabs — keine Schleife)
window.addEventListener('storage', e=>{
  if(e.key === LOCAL_ONLY_KEY){
    _localOnlyRestore = e.newValue === '1';
    setSyncStatus(_localOnlyRestore ? 'localOnly' : 'ok');
    return;
  }
  if(e.key === STORAGE_KEY && e.newValue){
    try{
      state = migrate(JSON.parse(e.newValue));
      renderAll();
      if(_localOnlyRestore){
        setSyncStatus('localOnly');
        toast('Lokale Sicherung aus anderem Tab übernommen — nicht synchronisiert');
      } else {
        toast('Daten aus anderem Tab übernommen 🔄');
      }
    }catch(err){ console.warn('Tab-Sync fehlgeschlagen', err); }
  }
});
// Countdown minütlich aktualisieren (nur Übersicht neu rendern, wenn aktiv)
setInterval(()=>{ if(activeTab==='uebersicht') renderOverview(); }, 60000);
// Cloud-Sync starten (falls konfiguriert): sofort, alle 25 s, bei Fokus & online
if(CLOUD_URL){
  syncNow();
  setInterval(syncNow, 25000);
  window.addEventListener('online', syncNow);
  document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) syncNow(); });
}
</script>
